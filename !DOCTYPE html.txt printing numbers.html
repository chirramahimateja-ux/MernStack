<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
    <title>Loops Demo</title>
</head>
<body>

<h2>Printing Numbers from 1 to 10</h2>

<script>
    // Using FOR loop
    document.write("<b>Using For Loop:</b><br>");
    for (var i = 1; i <= 10; i++) {
        document.write(i + "<br>");
    }

    document.write("<br>");

    // Using WHILE loop
    document.write("<b>Using While Loop:</b><br>");
    var j = 1;
    while (j <= 10) {
        document.write(j + "<br>");
        j++;
    }

    document.write("<br>");

    // Using DO-WHILE loop
    document.write("<b>Using Do-While Loop:</b><br>");
    var k = 1;
    do {
        document.write(k + "<br>");
        k++;
    } while (k <= 10);
</script>

</body>
</html>
