<!DOCTYPE html>
<html>
<head>
<title>HTML Lists</title>
</head>
<body>

<h2>Ordered list</h2>
<ol>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ol>

<h2>Unordered list</h2>
<ul>
<li>Apple</li>
<li>Mango</li>
<li>Banana</li>
</ul>

<h2>Nested list</h2>
<ul>
<li>web development</li>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>
</ul>

<h2>Order list inside unordered list</h2>
<ul>
<li>books</li>
<ol>
<li>fairy tales</li>
<li>cindrella</li>
<li>stranger things</li>
</ol>
</ul>

</body>
</html>
