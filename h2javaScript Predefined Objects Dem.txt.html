<h2>javaScript Predefined Objects Demo</h2>

<button onclick="showOutput()">Click Me</button>
<script>
<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Predefined Objects Demo</title>
</head>
<body>


//string object

var name = "JavaScript";
document.write("Original String: "+name + "<br>");
document.write("Length: " +name.length + <br>");
document.write("Upper Case: " + name.toUpperCase() + "<br><br>");
document.write("Upper Case: " + name.toLowerCase() + "<br><br>");


//Math object
document.write("Square Root of 25: " + Math.sqrt(25) + "<br>");
document.write("Maximum of (10, 20, 30): " + Math.max(10, 20, 30) + "<br><br>");
document.write("Maximum of (10, 20, 30): " + Math.min(10, 20, 30) + "<br><br>");

function shoeOutput() {
//Window object

 window.alert("This is an alert using Window object");

        // Date Object
        var today = new Date();
        window.alert("Current Date and Time: " + today);

}
</Script>
</body>
</html>
