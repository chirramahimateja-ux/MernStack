<!DOCTYPE html>
<html>
<head>
    <title>Factorial</title>
</head>
<body>

<h2>Factorial</h2>
<button onclick="factorial()"> Find Factorial</button>

<script>
   function factorial(){
    var  n=parseInt(prompt("Enter a number:"));
    var fact=1;
    for(var i=1;i<=n;i++){
        fact=fact*i;
    }
    document.write("Factorial of " +n+ " is: "+fact);
   }
</script>

</body>
</html>
