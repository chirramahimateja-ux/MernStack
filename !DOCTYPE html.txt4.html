<!DOCTYPE html>
<html>
<head>
<title> CSS Colors</title>
<style>
.color-name{
color:red;
}
.color-hex{
color:#0000FF;
}
.color-rgb{
color: rgb(0,128,0);
}
.color-rgba{
color:rgba(128,0,128,0.7);
}
.color-hsl{
color:hsl(30,100%,50%);
}
</style>
</head>
<body>
<h2 class="color-name">Color using Name</h2>
<h2 class="color-hex">Color using Hex Code </h2>
<h2 class="color-rgb">color using RGB</h2>
<h2 class="color-rgba">color using RGBA</h2>
<h2 class="color-hsl">Color using HSL</h2>
</body>
</html>
